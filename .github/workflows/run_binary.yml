name: Execute ARK Binary

on:
  repository_dispatch:
    types: [telegram_trigger]

jobs:
  execute:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Binary Execution Permissions
      run: chmod +x ./ARK

    - name: Run ARK Binary
      run: |
        echo "🚀 Starting ARK Binary execution on clean GitHub Runner..."
        ./ARK ${{ github.event.client_payload.ip }} ${{ github.event.client_payload.port }} ${{ github.event.client_payload.time }}
        echo "✅ Execution complete. VM spinning down and wiping data."
